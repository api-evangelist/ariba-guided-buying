naftiko: "1.0.0-alpha1"

info:
  label: "Ariba Guided Buying - Public Catalogs Shop API"
  description: "API for retrieving catalog items, facets, and search suggestions from public catalogs on SAP Business Network."
  tags:
    - Ariba
    - Catalog
    - Procurement
    - SAP
    - Shopping
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ARIBA_CATALOG_OAUTH_TOKEN: ARIBA_CATALOG_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: ariba-catalog-shop
      baseUri: https://openapi.ariba.com/api/catalog-shop/v1/prod
      description: "Public Catalogs Shop API for SAP Ariba Buying, base edition."
      authentication:
        type: bearer
        token: "{{ARIBA_CATALOG_OAUTH_TOKEN}}"
      resources:
        - name: shops
          path: /Shops
          description: "Catalog shop search and item retrieval."
          operations:
            - name: get-shop
              method: GET
              description: "Retrieve catalog items and facets for a shop."
              inputParameters:
                - name: shopID
                  in: path
                  type: string
                  required: true
                  description: "Shop identifier."
                - name: $expand
                  in: query
                  type: string
                  required: false
                  description: "Expand Items and/or Facets."
                - name: $search
                  in: query
                  type: string
                  required: false
                  description: "Search term."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-shop-items
              method: GET
              description: "List all catalog items for a shop."
              inputParameters:
                - name: shopID
                  in: path
                  type: string
                  required: true
                  description: "Shop identifier."
                - name: $search
                  in: query
                  type: string
                  required: false
                  description: "Search term."
                - name: $select
                  in: query
                  type: string
                  required: false
                  description: "Fields to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-shop-autocomplete
              method: GET
              description: "Get typeahead search suggestions for a shop."
              inputParameters:
                - name: shopID
                  in: path
                  type: string
                  required: true
                  description: "Shop identifier."
                - name: $search
                  in: query
                  type: string
                  required: true
                  description: "Partial search term."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: ariba-catalog-shop-rest
      resources:
        - path: /v1/shops/{shopId}
          name: shop
          description: "Catalog shop items and facets."
          operations:
            - method: GET
              name: get-shop
              description: "Get catalog items and facets."
              call: "ariba-catalog-shop.get-shop"
              with:
                shopID: "rest.shopId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/shops/{shopId}/items
          name: shop-items
          description: "Catalog shop items list."
          operations:
            - method: GET
              name: list-shop-items
              description: "List catalog items."
              call: "ariba-catalog-shop.list-shop-items"
              with:
                shopID: "rest.shopId"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/shops/{shopId}/autocomplete
          name: shop-autocomplete
          description: "Catalog search suggestions."
          operations:
            - method: GET
              name: get-autocomplete
              description: "Get search suggestions."
              call: "ariba-catalog-shop.get-shop-autocomplete"
              with:
                shopID: "rest.shopId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: ariba-catalog-shop-mcp
      transport: http
      tools:
        - name: get-shop-catalog
          description: "Retrieve catalog items and facets for an Ariba shop."
          hints:
            readOnly: true
            openWorld: true
          call: "ariba-catalog-shop.get-shop"
          with:
            shopID: "tools.shopID"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shop-items
          description: "List all catalog items for an Ariba shop."
          hints:
            readOnly: true
            openWorld: true
          call: "ariba-catalog-shop.list-shop-items"
          with:
            shopID: "tools.shopID"
          outputParameters:
            - type: object
              mapping: "$."
        - name: search-catalog-autocomplete
          description: "Get typeahead search suggestions from an Ariba catalog."
          hints:
            readOnly: true
            openWorld: true
          call: "ariba-catalog-shop.get-shop-autocomplete"
          with:
            shopID: "tools.shopID"
          outputParameters:
            - type: object
              mapping: "$."
