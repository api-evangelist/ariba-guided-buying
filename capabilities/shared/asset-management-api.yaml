naftiko: "1.0.0-alpha1"

info:
  label: "Ariba Guided Buying - Asset Management API"
  description: "API for retrieving asset-based purchase requisitions and updating asset line items in SAP Ariba Buying."
  tags:
    - Ariba
    - Asset Management
    - ERP
    - Procurement
    - Requisitions
    - SAP
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ARIBA_ASSET_OAUTH_TOKEN: ARIBA_ASSET_OAUTH_TOKEN

capability:
  consumes:
    - type: http
      namespace: ariba-asset-mgmt
      baseUri: https://openapi.ariba.com/api/asset-management/v1/prod
      description: "Asset Management API for SAP Ariba Buying and Invoicing."
      authentication:
        type: bearer
        token: "{{ARIBA_ASSET_OAUTH_TOKEN}}"
      resources:
        - name: requisitions
          path: /requisitions
          description: "Asset requisition management."
          operations:
            - name: list-asset-requisitions
              method: GET
              description: "List requisitions with asset line items."
              inputParameters:
                - name: realm
                  in: query
                  type: string
                  required: true
                  description: "SAP Ariba realm name."
                - name: $filter
                  in: query
                  type: string
                  required: false
                  description: "Filter by date ranges."
                - name: $skip
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: count-asset-requisitions
              method: GET
              description: "Get count of asset requisitions."
              inputParameters:
                - name: realm
                  in: query
                  type: string
                  required: true
                  description: "SAP Ariba realm name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-asset-line-items
              method: POST
              description: "Update asset numbers on requisition line items."
              inputParameters:
                - name: realm
                  in: query
                  type: string
                  required: true
                  description: "SAP Ariba realm name."
              body:
                type: json
                data:
                  updates: "{{tools.updates}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: ariba-asset-mgmt-rest
      resources:
        - path: /v1/requisitions
          name: requisitions
          description: "Asset requisitions."
          operations:
            - method: GET
              name: list-requisitions
              description: "List asset requisitions."
              call: "ariba-asset-mgmt.list-asset-requisitions"
              with:
                realm: "rest.realm"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/requisitions/count
          name: requisitions-count
          description: "Count of asset requisitions."
          operations:
            - method: GET
              name: count-requisitions
              description: "Count asset requisitions."
              call: "ariba-asset-mgmt.count-asset-requisitions"
              with:
                realm: "rest.realm"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/requisitions/batch/assets
          name: requisitions-batch-assets
          description: "Batch update asset numbers."
          operations:
            - method: POST
              name: update-assets
              description: "Update asset line items in batch."
              call: "ariba-asset-mgmt.update-asset-line-items"
              with:
                realm: "rest.realm"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: ariba-asset-mgmt-mcp
      transport: http
      tools:
        - name: list-asset-requisitions
          description: "List SAP Ariba purchase requisitions containing asset line items."
          hints:
            readOnly: true
            openWorld: false
          call: "ariba-asset-mgmt.list-asset-requisitions"
          with:
            realm: "tools.realm"
          outputParameters:
            - type: object
              mapping: "$."
        - name: count-asset-requisitions
          description: "Get the total count of asset-based requisitions in SAP Ariba."
          hints:
            readOnly: true
            openWorld: false
          call: "ariba-asset-mgmt.count-asset-requisitions"
          with:
            realm: "tools.realm"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-asset-line-items
          description: "Assign unique asset numbers to line items on SAP Ariba requisitions."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "ariba-asset-mgmt.update-asset-line-items"
          with:
            realm: "tools.realm"
          outputParameters:
            - type: object
              mapping: "$."
