naftiko: 1.0.0-alpha2
info:
  label: Ariba Guided Buying - Procurement Operations
  description: Unified procurement operations workflow combining catalog shopping and asset management for enterprise buyers
    and procurement administrators.
  tags:
  - Ariba
  - Asset Management
  - Catalog
  - Procurement
  - SAP
  - Shopping
  created: '2026-04-19'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    ARIBA_CATALOG_OAUTH_TOKEN: ARIBA_CATALOG_OAUTH_TOKEN
    ARIBA_ASSET_OAUTH_TOKEN: ARIBA_ASSET_OAUTH_TOKEN
capability:
  consumes:
  - type: http
    namespace: ariba-catalog-shop
    baseUri: https://openapi.ariba.com/api/catalog-shop/v1/prod
    description: Public Catalogs Shop API for SAP Ariba Buying, base edition.
    authentication:
      type: bearer
      token: '{{ARIBA_CATALOG_OAUTH_TOKEN}}'
    resources:
    - name: shops
      path: /Shops
      description: Catalog shop search and item retrieval.
      operations:
      - name: get-shop
        method: GET
        description: Retrieve catalog items and facets for a shop.
        inputParameters:
        - name: shopID
          in: path
          type: string
          required: true
          description: Shop identifier.
        - name: $expand
          in: query
          type: string
          required: false
          description: Expand Items and/or Facets.
        - name: $search
          in: query
          type: string
          required: false
          description: Search term.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-shop-items
        method: GET
        description: List all catalog items for a shop.
        inputParameters:
        - name: shopID
          in: path
          type: string
          required: true
          description: Shop identifier.
        - name: $search
          in: query
          type: string
          required: false
          description: Search term.
        - name: $select
          in: query
          type: string
          required: false
          description: Fields to return.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-shop-autocomplete
        method: GET
        description: Get typeahead search suggestions for a shop.
        inputParameters:
        - name: shopID
          in: path
          type: string
          required: true
          description: Shop identifier.
        - name: $search
          in: query
          type: string
          required: true
          description: Partial search term.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: ariba-asset-mgmt
    baseUri: https://openapi.ariba.com/api/asset-management/v1/prod
    description: Asset Management API for SAP Ariba Buying and Invoicing.
    authentication:
      type: bearer
      token: '{{ARIBA_ASSET_OAUTH_TOKEN}}'
    resources:
    - name: requisitions
      path: /requisitions
      description: Asset requisition management.
      operations:
      - name: list-asset-requisitions
        method: GET
        description: List requisitions with asset line items.
        inputParameters:
        - name: realm
          in: query
          type: string
          required: true
          description: SAP Ariba realm name.
        - name: $filter
          in: query
          type: string
          required: false
          description: Filter by date ranges.
        - name: $skip
          in: query
          type: integer
          required: false
          description: Pagination offset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: count-asset-requisitions
        method: GET
        description: Get count of asset requisitions.
        inputParameters:
        - name: realm
          in: query
          type: string
          required: true
          description: SAP Ariba realm name.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-asset-line-items
        method: POST
        description: Update asset numbers on requisition line items.
        inputParameters:
        - name: realm
          in: query
          type: string
          required: true
          description: SAP Ariba realm name.
        body:
          type: json
          data:
            updates: '{{tools.updates}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: ariba-procurement-api
    description: Unified REST API for SAP Ariba Guided Buying procurement operations.
    resources:
    - path: /v1/shops/{shopId}
      name: shop
      description: Catalog shop items and facets.
      operations:
      - method: GET
        name: get-shop
        description: Get catalog items and facets from SAP Business Network.
        call: ariba-catalog-shop.get-shop
        with:
          shopID: rest.shopId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/shops/{shopId}/items
      name: shop-items
      description: Catalog item listing.
      operations:
      - method: GET
        name: list-items
        description: List catalog items from a shop.
        call: ariba-catalog-shop.list-shop-items
        with:
          shopID: rest.shopId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/shops/{shopId}/autocomplete
      name: catalog-autocomplete
      description: Catalog search typeahead.
      operations:
      - method: GET
        name: autocomplete
        description: Get search suggestions from catalog.
        call: ariba-catalog-shop.get-shop-autocomplete
        with:
          shopID: rest.shopId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/requisitions
      name: requisitions
      description: Asset-based purchase requisitions.
      operations:
      - method: GET
        name: list-requisitions
        description: List purchase requisitions with asset items.
        call: ariba-asset-mgmt.list-asset-requisitions
        with:
          realm: rest.realm
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/requisitions/count
      name: requisitions-count
      description: Requisition count.
      operations:
      - method: GET
        name: count-requisitions
        description: Count asset-based requisitions.
        call: ariba-asset-mgmt.count-asset-requisitions
        with:
          realm: rest.realm
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/requisitions/batch/assets
      name: requisitions-batch
      description: Batch asset assignment.
      operations:
      - method: POST
        name: update-assets
        description: Assign asset numbers to requisition line items.
        call: ariba-asset-mgmt.update-asset-line-items
        with:
          realm: rest.realm
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: ariba-procurement-mcp
    transport: http
    description: MCP server for AI-assisted SAP Ariba Guided Buying procurement operations.
    tools:
    - name: get-shop-catalog
      description: Retrieve catalog items and facets from an SAP Ariba shop on SAP Business Network.
      hints:
        readOnly: true
        openWorld: true
      call: ariba-catalog-shop.get-shop
      with:
        shopID: tools.shopID
      outputParameters:
      - type: object
        mapping: $.
    - name: list-catalog-items
      description: List catalog items with details from an SAP Ariba shop.
      hints:
        readOnly: true
        openWorld: true
      call: ariba-catalog-shop.list-shop-items
      with:
        shopID: tools.shopID
      outputParameters:
      - type: object
        mapping: $.
    - name: search-catalog
      description: Get typeahead search suggestions from an SAP Ariba catalog.
      hints:
        readOnly: true
        openWorld: true
      call: ariba-catalog-shop.get-shop-autocomplete
      with:
        shopID: tools.shopID
      outputParameters:
      - type: object
        mapping: $.
    - name: list-asset-requisitions
      description: List SAP Ariba purchase requisitions containing asset line items pending asset assignment.
      hints:
        readOnly: true
        openWorld: false
      call: ariba-asset-mgmt.list-asset-requisitions
      with:
        realm: tools.realm
      outputParameters:
      - type: object
        mapping: $.
    - name: count-asset-requisitions
      description: Get total count of asset-based purchase requisitions in SAP Ariba.
      hints:
        readOnly: true
        openWorld: false
      call: ariba-asset-mgmt.count-asset-requisitions
      with:
        realm: tools.realm
      outputParameters:
      - type: object
        mapping: $.
    - name: assign-asset-numbers
      description: Assign unique asset numbers to line items on SAP Ariba purchase requisitions.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: ariba-asset-mgmt.update-asset-line-items
      with:
        realm: tools.realm
      outputParameters:
      - type: object
        mapping: $.
