apis:
  - aid: ariba-guided-buying:ariba-guided-buying-catalog-shop-api
    name: Ariba Guided Buying - Public Catalogs Shop API
    description: >-
      The Public Catalogs Shop API enables applications to retrieve data related
      to catalog items, filter facets, and matching search suggestions from
      public catalogs on SAP Business Network. This API supports SAP Ariba
      Buying, base edition, integrated with SAP S/4HANA Cloud Public Edition.
    humanURL: https://help.sap.com/docs/ariba-apis
