aid: ariba-guided-buying
name: Ariba Guided Buying
description: >-
  SAP Ariba Guided Buying provides a consumer-like shopping experience for
  enterprise procurement, enabling employees to find and purchase goods and
  services through an intuitive catalog-driven interface with built-in approval
  workflows and policy compliance.
