  - type: Features
    data:
      - name: Consumer-Like Shopping Experience
        description: Provides employees with an intuitive catalog-driven shopping interface
          similar to consumer e-commerce applications.
      - name: Catalog Search and Typeahead
        description: Full-text search with typeahead autocomplete for finding catalog
          items from suppliers on SAP Business Network.
      - name: Policy Compliance Enforcement
        description: Built-in procurement policy checks ensure purchases comply with
          organizational spending rules and approval workflows.
      - name: Asset Management Integration
        description: Integrates with SAP ERP asset management to assign and track asset
          numbers on requisition line items.
      - name: OAuth 2.0 Authentication
        description: Secure API access using OAuth 2.0 client credentials flow with
          per-API credentials.
      - name: Faceted Search
        description: Retrieves filter facets alongside catalog items enabling refined
          product browsing and discovery.
  - type: UseCases
    data:
      - name: Employee Self-Service Procurement
        description: Enable employees to browse and purchase approved goods from
          supplier catalogs without manual procurement processes.
      - name: ERP Asset Record Import
        description: Import asset records from SAP ERP and assign unique asset values to
          line items on approved requisitions.
      - name: Catalog Integration
        description: Integrate SAP Ariba Buying with SAP S/4HANA Cloud Public Edition to
          access public supplier catalogs on SAP Business Network.
      - name: Requisition Automation
        description: Automate retrieval and processing of asset-based requisitions through
          the Asset Workbench workflow.
  - type: Integrations
    data:
      - name: SAP S/4HANA Cloud
        description: Integrates with SAP S/4HANA Cloud Public Edition for purchase
          request creation and order management.
      - name: SAP Business Network
        description: Connects to SAP Business Network to access public supplier catalogs
          and pricing.
      - name: SAP ERP
        description: Integrates with SAP ERP systems for asset management and purchase
          order creation.
      - name: SAP Integration Suite
        description: Extends SAP Ariba functionality through SAP Integration Suite for
          custom workflows and data transformations.
